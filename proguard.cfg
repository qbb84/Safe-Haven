-optimizationpasses 5
-verbose

-renamesourcefileattribute SourceFile
-keepattributes SourceFile,LineNumberTable,Signature

-dontwarn com.badlogic.gdx.jnigen.**
-dontwarn java.awt.**
-dontwarn com.badlogic.**
-dontwarn org.lwjgl.**

-dontnote java.awt.**
-dontnote com.badlogic.**
-dontnote org.lwjgl.**

-keep class org.lwjgl.** { *; }
-keep class com.badlogic.** { *; }
-keep class * implements com.badlogic.gdx.utils.Json*

-keepnames class * implements java.io.Serializable

-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    private static final java.io.ObjectStreamField[] serialPersistentFields;
    !static !transient <fields>;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
}

-keepclasseswithmembernames class * {
    native <methods>;
}

-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}


-keep public class com.packtpub.libgdx.safehaven.desktop.DesktopLauncher{
  public static void main(java.lang.String[]);
}

-keepclassmembers class com.packtpub.libgdx.safehaven.EntityConfig{ *; }
-keepclassmembers class com.packtpub.libgdx.safehaven.EntityConfig$AnimationConfig{ *; }
-keepclassmembers class com.packtpub.libgdx.safehaven.dialog.ConversationGraph{ *; }
-keepclassmembers class com.packtpub.libgdx.safehaven.quest.QuestGraph{ *; }
-keepclassmembers class com.packtpub.libgdx.safehaven.battle.LevelTable{ *; }
-keepclassmembers class com.packtpub.libgdx.safehaven.battle.MonsterZone{ *; }
-keepclassmembers class com.packtpub.libgdx.safehaven.InventoryItem{ *; }

-keep class com.packtpub.libgdx.safehaven.dialog.ConversationChoice{ *; }
-keep class com.packtpub.libgdx.safehaven.dialog.Conversation{ *; }
-keep class com.packtpub.libgdx.safehaven.quest.QuestTask{ *; }
-keep class com.packtpub.libgdx.safehaven.quest.QuestTaskDependency{ *; }
